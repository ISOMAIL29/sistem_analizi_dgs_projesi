<!doctype html>
<html class="light" lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>DGS Akademi - Splash Screen</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              tertiary: "#371800",
              "tertiary-fixed-dim": "#ffb783",
              "surface-container": "#e5eeff",
              "error-container": "#ffdad6",
              "surface-container-highest": "#d3e4fe",
              "inverse-on-surface": "#eaf1ff",
              "tertiary-fixed": "#ffdcc5",
              "on-surface": "#0b1c30",
              "surface-variant": "#d3e4fe",
              primary: "#002045",
              outline: "#74777f",
              "on-primary": "#ffffff",
              secondary: "#138bed",
              "on-tertiary-fixed": "#301400",
              "on-primary-fixed-variant": "#2d476f",
              background: "#f8f9ff",
              surface: "#f8f9ff",
              "on-surface-variant": "#43474e",
              "on-secondary-fixed-variant": "#005047",
              "on-background": "#0b1c30",
              "surface-container-low": "#eff4ff",
              "primary-fixed-dim": "#adc7f7",
              error: "#ba1a1a",
              "surface-dim": "#cbdbf5",
              "outline-variant": "#c4c6cf",
              "surface-container-high": "#dce9ff",
              "secondary-container": "#62fae3",
              "secondary-fixed": "#62fae3",
              "inverse-primary": "#adc7f7",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed": "#00201c",
              "on-tertiary-fixed-variant": "#713700",
              "primary-container": "#1a365d",
              "on-tertiary": "#ffffff",
              "primary-fixed": "#d6e3ff",
              "on-tertiary-container": "#ea842f",
              "surface-bright": "#f8f9ff",
              "secondary-fixed-dim": "#3cddc7",
              "on-error": "#ffffff",
              "inverse-surface": "#213145",
              "on-secondary-container": "#007165",
              "tertiary-container": "#572900",
              "on-primary-fixed": "#001b3c",
              "on-error-container": "#93000a",
              "surface-tint": "#455f88",
              "on-primary-container": "#86a0cd",
              "on-secondary": "#ffffff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "container-margin": "1.5rem",
              "stack-tight": "0.5rem",
              "element-gap": "0.75rem",
              gutter: "1rem",
              "section-gap": "2rem",
            },
            fontFamily: {
              "body-sm": ["Inter"],
              "label-caps": ["Inter"],
              "body-base": ["Inter"],
              "title-sm": ["Manrope"],
              "headline-md": ["Manrope"],
              "display-lg": ["Manrope"],
            },
            fontSize: {
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-caps": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.05em",
                  fontWeight: "600",
                },
              ],
              "body-base": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "title-sm": ["18px", { lineHeight: "24px", fontWeight: "600" }],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "display-lg": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      .math-grid {
        background-image:
          linear-gradient(to right, #e2e8f0 1px, transparent 1px),
          linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .radial-fade {
        background: radial-gradient(circle, transparent 20%, #f8f9ff 100%);
      }
    </style>
  </head>

  <body
    class="bg-background text-on-background min-h-screen overflow-hidden flex flex-col font-body-base"
  >
    <!-- Subtle Background Pattern Cluster -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-40">
      <div class="absolute inset-0 math-grid"></div>
      <div class="absolute inset-0 radial-fade"></div>
      <!-- Geometric Accents -->
      <div
        class="absolute top-[-10%] right-[-5%] w-96 h-96 border-[40px] border-primary/5 rounded-full"
      ></div>
      <div
        class="absolute bottom-[15%] left-[-10%] w-64 h-64 border-[2px] border-secondary/10 rotate-45"
      ></div>
      <div class="absolute top-[20%] left-[10%] opacity-10">
        <span class="material-symbols-outlined text-[120px] text-primary"
          >functions</span
        >
      </div>
      <div class="absolute bottom-[10%] right-[15%] opacity-10">
        <span class="material-symbols-outlined text-[100px] text-primary"
          >shapes</span
        >
      </div>
    </div>
    <!-- Main Content Canvas -->
    <main
      class="relative z-10 flex-grow flex flex-col items-center justify-center px-container-margin"
    >
      <div class="flex flex-col items-center space-y-element-gap">
        <!-- Logo Container -->
        <div class="relative group">
          <!-- Outer Glow -->
          <div
            class="absolute -inset-4 bg-primary/5 rounded-full blur-2xl group-hover:bg-primary/10 transition-all duration-700"
          ></div>
          <!-- Main Image -->
          <div
            class="relative w-32 h-32 md:w-40 md:h-40 bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-outline-variant/30 flex items-center justify-center p-6 overflow-hidden"
          >
            <img
              alt="DGS Matematik Logo"
              class="w-full h-full object-contain"
              data-alt="A clean, minimalist educational logo for a mathematics application, featuring abstract geometric shapes and a stylized compass or pencil icon. The design is rendered in professional navy blue and teal tones on a crisp white circular background. High-end modern ed-tech aesthetic with soft ambient lighting and sharp vector-style precision, conveying authority and clarity."
              src="logo.svg"
            />
          </div>
        </div>
        <!-- App Identity -->
        <div class="text-center mt-gutter">
          <h1
            class="font-headline-md text-display-lg text-primary tracking-tight"
          >
            DGS MATEMATİK
          </h1>
          <br />
          <h1>SORU BANKASI</h1>
        </div>
      </div>
    </main>
    <!-- Footer Identity -->
    <footer class="relative z-10 py-10 flex flex-col items-center">
      <!-- Progress Bar Indicator (Visual Only) -->
      <div
        class="w-48 h-1 bg-surface-container rounded-full mb-6 overflow-hidden"
      >
        <div class="w-1/3 h-full bg-secondary rounded-full"></div>
      </div>
      <p
        class="font-label-caps text-on-surface-variant flex items-center gap-2"
      >
        <span class="opacity-50">Made by ISOMAIL</span>
        <span class="text-primary font-bold tracking-wider"><br /></span>
      </p>
    </footer>
    <!-- Material Symbols Injection -->
    <div class="hidden">
      <span class="material-symbols-outlined">menu_book</span>
      <span class="material-symbols-outlined">map</span>
      <span class="material-symbols-outlined">quiz</span>
      <span class="material-symbols-outlined">assignment_turned_in</span>
      <span class="material-symbols-outlined">person</span>
    </div>
  </body>
</html>
